<script>
let contatos = [];
let mapsService;

// controle de paginação (NOVO)
let isPaginating = false;

function log(msg) {
  const box = document.getElementById('log-box');
  const d = new Date();
  box.innerHTML += `<div>[${d.toLocaleTimeString()}] ${msg}</div>`;
  box.scrollTop = box.scrollHeight;
}

async function buscar() {
  const key = document.getElementById('gkey').value;
  const max = parseInt(document.getElementById('maxres').value);
  if(!key) return alert("Por favor, insira sua Chave do Google Maps.");

  const btn = document.getElementById('btn-buscar');
  btn.disabled = true; 
  btn.innerText = "CARREGANDO MAPS...";

  if (typeof google === 'undefined') {
    const s = document.createElement('script');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=places&callback=initBusca`;
    s.async = true;
    s.defer = true;

    window.initBusca = () => executarBusca(max);
    document.head.appendChild(s);
  } else {
    executarBusca(max);
  }
}

function executarBusca(maxres) {
  const termo = document.getElementById('termo').value;
  const cidade = document.getElementById('cidade').value;
  const bairro = document.getElementById('bairro').value;

  const query = `${termo} em ${bairro}, ${cidade}`;

  log(`Buscando por: ${query}...`);

  contatos = [];
  isPaginating = false;

  mapsService = new google.maps.places.PlacesService(document.createElement('div'));

  const callback = (results, status, pagination) => {

    if (status === "OK" && results) {

      results.forEach(p => {
        if (!contatos.find(c => c.id === p.place_id)) {
          contatos.push({
            id: p.place_id,
            nome: p.name,
            telefone: 'Carregando...',
            status: 'Pendente'
          });
        }
      });

      renderTabela();

      const hasMore = pagination && pagination.hasNextPage;
      const stillNeeded = contatos.length < maxres;

      if (hasMore && stillNeeded && !isPaginating) {

        isPaginating = true;

        log(`Mais resultados disponíveis... aguardando Google liberar próxima página`);

        const next = pagination.nextPage;

        setTimeout(() => {
          isPaginating = false;
          next();
        }, 2300);

      } else {
        log(`Busca finalizada. Iniciando coleta de telefones...`);
        extrairTelefones();
        document.getElementById('btn-buscar').disabled = false;
        document.getElementById('btn-buscar').innerText = "BUSCAR CONTATOS NO GOOGLE";
      }
    }

    if (status !== "OK") {
      log("Erro na busca Google Places: " + status);
      document.getElementById('btn-buscar').disabled = false;
    }
  };

  mapsService.textSearch({ query }, callback);
}

function extrairTelefones() {
  contatos.forEach((c, i) => {
    setTimeout(() => {
      mapsService.getDetails(
        { placeId: c.id, fields: ['formatted_phone_number'] },
        (place, status) => {
          if (status === "OK" && place) {
            contatos[i].telefone = place.formatted_phone_number || "Sem Telefone";
          } else {
            contatos[i].telefone = "Não listado";
          }
          renderTabela();
        }
      );
    }, i * 400);
  });
}

function renderTabela() {
  const tbody = document.getElementById('tbody');
  document.getElementById('painel-resultados').style.display = 'block';
  document.getElementById('contador').innerText = contatos.length;

  tbody.innerHTML = contatos
    .map(c => `<tr><td>${c.nome}</td><td>${c.telefone}</td><td>${c.status}</td></tr>`)
    .join('');
}

async function enviarParaN8N() {
  const url = document.getElementById('webhook').value;
  const btn = document.getElementById('btn-n8n');

  const validos = contatos.filter(c =>
    c.telefone !== "Sem Telefone" &&
    c.telefone !== "Carregando..." &&
    c.telefone !== "Não listado"
  );

  if(validos.length === 0) return alert("Nenhum contato válido para enviar.");

  btn.disabled = true;
  btn.innerText = "ENVIANDO...";

  log(`Enviando ${validos.length} contatos para n8n...`);

  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ contatos: validos })
    });

    if(response.ok) alert("SUCESSO! Enviado para n8n.");
    else alert("Erro no webhook n8n.");
  } catch (e) {
    alert("Erro de conexão com webhook.");
  }

  btn.disabled = false;
  btn.innerText = "🚀 ENVIAR TUDO PARA O N8N";
}
</script>
