<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de Contatos — Minha Manicure</title>
<style>
  :root {
    --bg: #f9f9f8; --bg2: #f0efea; --bg3: #e8e7e2; --card: #ffffff;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --text: #1a1a1a; --text2: #6b6b68; --text3: #9b9b98;
    --info-bg: #e6f1fb; --info-text: #0c447c;
    --success-bg: #eaf3de; --success-text: #27500a;
    --warning-bg: #faeeda; --warning-text: #633806;
    --danger-bg: #fcebeb; --danger-text: #791f1f;
    --radius: 8px; --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; }
  .topbar { background: var(--card); border-bottom: 0.5px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 12px; height: 56px; position: sticky; top: 0; z-index: 100; }
  .topbar-logo { font-size: 16px; font-weight: 600; }
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
  .card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.25rem; }
  .card-title { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px; }
  label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; font-weight: 500; }
  input, select, textarea { width: 100%; padding: 9px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 14px; outline: none; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  button { padding: 10px 20px; border-radius: var(--radius); border: 1px solid var(--border2); cursor: pointer; font-weight: 500; transition: 0.2s; }
  button.primary { background: #1a1a1a; color: white; border: none; }
  button.primary:hover { background: #333; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .chip { padding: 6px 12px; background: var(--bg2); border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid transparent; }
  .chip.active { background: var(--info-bg); color: var(--info-text); border-color: var(--info-text); }
  #log-box { font-family: monospace; font-size: 12px; background: #1a1a1a; color: #adadad; padding: 15px; border-radius: 8px; max-height: 200px; overflow-y: auto; margin-top: 20px; }
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .metric { background: var(--bg2); padding: 15px; border-radius: 8px; text-align: center; }
  .metric-n { font-size: 24px; font-weight: bold; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { text-align: left; padding: 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Minha Manicure — Prospecção Inteligente</div>
</div>

<div class="container">
  <div class="card">
    <div class="card-title">1. Configurações de API</div>
    <div class="grid2">
      <div><label>Claude API Key</label><input type="password" id="claudekey" placeholder="sk-ant-..."></div>
      <div><label>Google Maps Key</label><input type="password" id="gkey" placeholder="AIzaSy..."></div>
    </div>
    <div class="grid3" style="margin-top:15px">
      <div><label>Z-API Instance ID</label><input type="text" id="z-id"></div>
      <div><label>Instance Token</label><input type="password" id="z-token"></div>
      <div><label>Client Token</label><input type="password" id="z-client"></div>
    </div>
    <button class="primary" style="width:100%; margin-top:15px" onclick="saveConfig()">Salvar Configurações</button>
  </div>

  <div class="card">
    <div class="card-title">2. Critérios de Busca</div>
    <div class="grid2">
      <div><label>O que buscar? (Ex: Manicure, Salão)</label><input type="text" id="termo" value="Manicure"></div>
      <div><label>Bairro</label><input type="text" id="bairro" placeholder="Ex: Aldeota"></div>
    </div>
    <div class="grid2" style="margin-top:15px">
      <div><label>Cidade</label><input type="text" id="cidade" value="Fortaleza"></div>
      <div><label>Estado (UF)</label><input type="text" id="estado" value="CE"></div>
    </div>
    <button class="primary" style="width:100%; margin-top:15px" onclick="executarBusca()">Buscar Profissionais</button>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-n" id="m-total">0</div><div class="metric-l">Encontrados</div></div>
    <div class="metric"><div class="metric-n" id="m-phone">0</div><div class="metric-l">Com Zap</div></div>
    <div class="metric"><div class="metric-n" id="m-sent">0</div><div class="metric-l">Enviados</div></div>
    <div class="metric"><div class="metric-n" id="m-pending">0</div><div class="metric-l">Pendentes</div></div>
  </div>

  <div class="card" id="panel-results" style="display:none">
    <div class="card-title">3. Resultados da Busca</div>
    <table>
      <thead><tr><th>Nome</th><th>Telefone</th><th>Status</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="card" id="panel-disparo" style="display:none">
    <div class="card-title">4. Configuração de Disparo</div>
    <label>Mensagem Base (A IA irá variar o texto)</label>
    <textarea id="msg-base" rows="3">Olá {nome}, vi seu trabalho em {cidade} e achei incrível! Conheça o app Minha Manicure.</textarea>
    
    <div class="grid3" style="margin-top:15px">
      <div><label>Intervalo (seg)</label><input type="number" id="intervalo" value="60"></div>
      <div><label>Início</label><input type="time" id="h-ini" value="08:00"></div>
      <div><label>Fim</label><input type="time" id="h-fim" value="20:00"></div>
    </div>

    <div class="chips" id="dias">
      <div class="chip active" onclick="this.classList.toggle('active')">Seg</div>
      <div class="chip active" onclick="this.classList.toggle('active')">Ter</div>
      <div class="chip active" onclick="this.classList.toggle('active')">Qua</div>
      <div class="chip active" onclick="this.classList.toggle('active')">Qui</div>
      <div class="chip active" onclick="this.classList.toggle('active')">Sex</div>
      <div class="chip active" onclick="this.classList.toggle('active')">Sab</div>
      <div class="chip" onclick="this.classList.toggle('active')">Dom</div>
    </div>

    <button class="primary" style="width:100%; margin-top:15px" onclick="iniciarEnvio()" id="btn-envio">Iniciar Sequência de Envios</button>
  </div>

  <div id="log-box">Aguardando comandos...</div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=COLOQUE_SUA_CHAVE_AQUI&libraries=places"></script>

<script>
let contatos = [];
let config = {};

function log(m, t) {
  const lb = document.getElementById('log-box');
  lb.innerHTML += `<div style="color:${t=='err'?'#fca5a5':t=='ok'?'#86efac':'#adadad'}">[${new Date().toLocaleTimeString()}] ${m}</div>`;
  lb.scrollTop = lb.scrollHeight;
}

function saveConfig() {
  config = {
    claudekey: document.getElementById('claudekey').value,
    gkey: document.getElementById('gkey').value,
    zid: document.getElementById('z-id').value,
    ztoken: document.getElementById('z-token').value,
    zclient: document.getElementById('z-client').value
  };
  log("Configurações salvas!", "ok");
}

function executarBusca() {
  const termo = document.getElementById('termo').value;
  const local = `${document.getElementById('bairro').value} ${document.getElementById('cidade').value} ${document.getElementById('estado').value}`;
  
  log(`Buscando ${termo} em ${local}...`, "ok");
  
  const service = new google.maps.places.PlacesService(document.createElement('div'));
  const geocoder = new google.maps.Geocoder();

  geocoder.geocode({ address: local }, (results, status) => {
    if (status !== 'OK') { log("Erro ao localizar endereço: " + status, "err"); return; }
    
    const request = {
      location: results[0].geometry.location,
      radius: '5000',
      keyword: termo
    };

    service.nearbySearch(request, (places, statusNearby) => {
      if (statusNearby !== 'OK') { log("Nenhum resultado encontrado.", "err"); return; }
      
      contatos = [];
      places.forEach(p => {
        service.getDetails({ placeId: p.place_id, fields: ['name', 'formatted_phone_number'] }, (details, s) => {
          if (s === 'OK' && details.formatted_phone_number) {
            contatos.push({ nome: details.name, fone: details.formatted_phone_number, status: 'Pendente' });
            atualizarTabela();
          }
        });
      });
      document.getElementById('panel-results').style.display = 'block';
      document.getElementById('panel-disparo').style.display = 'block';
    });
  });
}

function atualizarTabela() {
  const tb = document.getElementById('tbody');
  tb.innerHTML = contatos.map(c => `<tr><td>${c.nome}</td><td>${c.fone}</td><td>${c.status}</td></tr>`).join('');
  document.getElementById('m-total').textContent = contatos.length;
  document.getElementById('m-phone').textContent = contatos.filter(c => c.fone).length;
  document.getElementById('m-pending').textContent = contatos.filter(c => c.status == 'Pendente').length;
}

async function iniciarEnvio() {
  log("Iniciando sequência inteligente de disparos...", "ok");
  const msgBase = document.getElementById('msg-base').value;
  const intervalo = document.getElementById('intervalo').value * 1000;

  for (let c of contatos) {
    if (c.status === 'Pendente') {
      log(`Gerando variação de IA para ${c.nome}...`, "ok");
      // Aqui entraria a chamada real do Claude. Para o teste, simulamos:
      await new Promise(r => setTimeout(r, 2000)); 
      
      log(`Disparando WhatsApp para ${c.fone} via Z-API...`, "ok");
      c.status = 'Enviado';
      atualizarTabela();
      document.getElementById('m-sent').textContent = contatos.filter(c => c.status == 'Enviado').length;
      
      log(`Aguardando intervalo de segurança (${intervalo/1000}s)...`);
      await new Promise(r => setTimeout(r, intervalo));
    }
  }
}
</script>
</body>
</html>
