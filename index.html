<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de Contatos — Disparo WhatsApp</title>

<script async defer 
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBbSmfsgUVtmR9FbDIdMeX4lePOl138GXQ&libraries=places">
</script>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
input,button { padding:10px; margin:5px; }
#log { background:#000; color:#0f0; padding:10px; height:150px; overflow:auto; font-size:12px;}
table { width:100%; margin-top:10px; border-collapse: collapse;}
td,th { border:1px solid #ccc; padding:5px; }
</style>
</head>

<body>

<h2>Buscador + Disparo WhatsApp</h2>

<input id="termo" placeholder="Ex: Manicure">
<input id="cidade" placeholder="Cidade">
<button onclick="buscar()">Buscar</button>

<br><br>

<input id="z-id" placeholder="Instance ID">
<input id="z-token" placeholder="Instance Token">
<input id="z-client" placeholder="Client Token">

<br><br>
<button onclick="iniciarDisparo()">Disparar WhatsApp</button>

<table>
<thead><tr><th>Nome</th><th>Telefone</th><th>Status</th></tr></thead>
<tbody id="tbody"></tbody>
</table>

<div id="log"></div>

<script>

let contatos = [];
let enviados = 0;

function log(msg){
  const el = document.getElementById('log');
  el.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
  el.scrollTop = el.scrollHeight;
}

// 🔥 BUSCA CORRIGIDA
function buscar(){

  if (typeof google === 'undefined' || !google.maps) {
    log("⏳ Google ainda carregando... tentando novamente...");
    setTimeout(buscar,2000);
    return;
  }

  const termo = document.getElementById('termo').value;
  const cidade = document.getElementById('cidade').value;

  const map = new google.maps.Map(document.createElement('div'));
  const service = new google.maps.places.PlacesService(map);

  contatos = [];

  service.textSearch({ query: `${termo} em ${cidade}` }, (results, status) => {

    if (status !== google.maps.places.PlacesServiceStatus.OK){
      log("Erro: "+status);
      return;
    }

    let total = results.length;
    let done = 0;

    results.forEach(p => {
      service.getDetails({
        placeId: p.place_id,
        fields: ['name','formatted_phone_number']
      }, (d, s2) => {

        done++;

        if (s2 === google.maps.places.PlacesServiceStatus.OK){
          contatos.push({
            nome: d.name,
            telefone: d.formatted_phone_number || '',
            status: d.formatted_phone_number ? 'Pendente' : 'Sem telefone'
          });
        }

        if (done === total){
          render();
          log("Busca finalizada!");
        }

      });
    });

  });
}

function render(){
  document.getElementById('tbody').innerHTML = contatos.map(c=>`
    <tr>
      <td>${c.nome}</td>
      <td>${c.telefone}</td>
      <td>${c.status}</td>
    </tr>
  `).join('');
}

// 🚀 DISPARO
async function iniciarDisparo(){
  log("Iniciando disparo...");

  for (let c of contatos){
    if (c.telefone && c.status === 'Pendente'){

      await enviar(c);

      await new Promise(r=>setTimeout(r,30000)); // 30s
    }
  }
}

async function enviar(c){

  const id = document.getElementById('z-id').value;
  const token = document.getElementById('z-token').value;
  const client = document.getElementById('z-client').value;

  const phone = '55'+c.telefone.replace(/\D/g,'');

  try{
    const res = await fetch(`https://api.z-api.io/instances/${id}/token/${token}/send-text`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Client-Token':client},
      body: JSON.stringify({
        phone,
        message: `Olá ${c.nome}, tudo bem?`
      })
    });

    if(res.ok){
      c.status='Enviado';
      enviados++;
      log(`Enviado para ${c.nome}`);
      render();
    }

  }catch(e){
    log("Erro envio: "+e.message);
  }
}

</script>

</body>
</html>
