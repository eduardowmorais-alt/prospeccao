<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de Contatos — Minha Manicure</title>

<style>
  :root {
    --bg: #f9f9f8; --bg2: #f0efea; --card: #ffffff; --border: rgba(0,0,0,0.12);
    --text: #1a1a1a; --text2: #6b6b68; --radius: 8px; --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 2rem; }
  .container { max-width: 900px; margin: 0 auto; }
  .card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; }

  label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; }
  input, select { width: 100%; padding: 10px; border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; font-size: 14px; }

  button { width: 100%; padding: 12px; border-radius: var(--radius); border: none; background: #1a1a1a; color: white; font-weight: 600; cursor: pointer; }
  button:hover { background: #333; }
  button:disabled { opacity: 0.5; }

  button.n8n { background: #ff6b6b; margin-top: 20px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
  th, td { text-align: left; padding: 10px; border-bottom: 0.5px solid var(--border); }

  #log-box {
    font-family: monospace;
    font-size: 12px;
    background: #1a1a1a;
    color: #86efac;
    padding: 15px;
    border-radius: var(--radius);
    margin-top: 10px;
    max-height: 150px;
    overflow-y: auto;
  }
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <div style="font-weight:bold;margin-bottom:15px;">1. CONFIGURAÇÕES</div>
    <div class="grid">
      <div>
        <label>Chave Google Maps</label>
        <input type="password" id="gkey">
      </div>

      <div>
        <label>Webhook n8n</label>
        <input type="text" id="webhook">
      </div>
    </div>
  </div>

  <div class="card">
    <div style="font-weight:bold;margin-bottom:15px;">2. BUSCA</div>

    <div class="grid">
      <div>
        <label>Serviço</label>
        <input id="termo" value="Manicure">
      </div>

      <div>
        <label>Cidade</label>
        <input id="cidade" value="Fortaleza">
      </div>

      <div>
        <label>Bairro</label>
        <input id="bairro" value="Aldeota">
      </div>

      <div>
        <label>Qtd</label>
        <select id="maxres">
          <option value="20">20</option>
          <option value="40">40</option>
          <option value="60">60</option>
        </select>
      </div>
    </div>

    <button id="btn-buscar" onclick="buscar()">BUSCAR CONTATOS</button>
  </div>

  <div class="card" id="painel-resultados" style="display:none;">
    <div><b>Total:</b> <span id="contador">0</span></div>

    <table>
      <thead>
        <tr><th>Nome</th><th>Telefone</th><th>Status</th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <button class="n8n" id="btn-n8n" onclick="enviarParaN8N()">ENVIAR N8N</button>
  </div>

  <div id="log-box">Aguardando...</div>

</div>

<script>

let contatos = [];
let mapsService;
let isPaginating = false;

function log(msg){
  const box = document.getElementById("log-box");
  box.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  box.scrollTop = box.scrollHeight;
}

function buscar(){
  const key = document.getElementById("gkey").value;
  const max = parseInt(document.getElementById("maxres").value);

  if(!key) return alert("Insira chave Google Maps");

  const btn = document.getElementById("btn-buscar");
  btn.disabled = true;
  btn.innerText = "Carregando...";

  if(typeof google === "undefined"){
    const s = document.createElement("script");
    s.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=places&callback=initBusca`;
    s.async = true;
    s.defer = true;

    window.initBusca = () => executarBusca(max);
    document.head.appendChild(s);
  } else {
    executarBusca(max);
  }
}

function executarBusca(maxres){

  if(!window.google || !google.maps || !google.maps.places){
    log("Google API não carregou");
    return;
  }

  const query = `${document.getElementById("termo").value} em ${document.getElementById("bairro").value}, ${document.getElementById("cidade").value}`;

  log("Buscando: " + query);

  contatos = [];
  isPaginating = false;

  mapsService = new google.maps.places.PlacesService(document.createElement("div"));

  mapsService.textSearch({ query }, callback);

  function callback(results, status, pagination){

    if(status !== "OK") {
      log("Erro: " + status);
      return;
    }

    results.forEach(p => {
      if(!contatos.find(c => c.id === p.place_id)){
        contatos.push({
          id: p.place_id,
          nome: p.name,
          telefone: "Carregando...",
          status: "Pendente"
        });
      }
    });

    render();

    const hasMore = pagination && pagination.hasNextPage;
    const needMore = contatos.length < maxres;

    if(hasMore && needMore && !isPaginating){
      isPaginating = true;
      const next = pagination.nextPage;

      setTimeout(() => {
        isPaginating = false;
        next();
      }, 2300);

    } else {
      log("Finalizado. Buscando telefones...");
      getPhones();

      document.getElementById("btn-buscar").disabled = false;
      document.getElementById("btn-buscar").innerText = "BUSCAR CONTATOS";
    }
  }
}

function getPhones(){

  contatos.forEach((c,i)=>{

    setTimeout(()=>{

      mapsService.getDetails({
        placeId: c.id,
        fields: ["formatted_phone_number"]
      }, (place,status)=>{

        if(status==="OK" && place){
          contatos[i].telefone = place.formatted_phone_number || "Sem telefone";
        } else {
          contatos[i].telefone = "Não listado";
        }

        render();

      });

    }, i*400);

  });

}

function render(){

  const tbody = document.getElementById("tbody");
  document.getElementById("painel-resultados").style.display="block";
  document.getElementById("contador").innerText = contatos.length;

  tbody.innerHTML = contatos.map(c =>
    `<tr><td>${c.nome}</td><td>${c.telefone}</td><td>${c.status}</td></tr>`
  ).join("");

}

async function enviarParaN8N(){

  const url = document.getElementById("webhook").value;

  const validos = contatos.filter(c =>
    c.telefone !== "Carregando..." &&
    c.telefone !== "Não listado"
  );

  if(!validos.length) return alert("Nada válido");

  await fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contatos:validos})
  });

  alert("Enviado!");

}

</script>

</body>
</html>
